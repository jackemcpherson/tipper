name: Publish predictions

on:
  schedule:
    # Thursdays 07:30 UTC = 17:30 Melbourne during AEST (the AFL winter
    # season), ahead of footyBot's 18:20+ round-preview window. Caveat:
    # during AEDT (roughly Oct-Apr) the same cron lands at 18:30 Melbourne,
    # i.e. after 18:20 — acceptable per tipper#28, since the preview window
    # only matters in AEST months; use workflow_dispatch if an AEDT-period
    # run ever needs to land earlier.
    - cron: "30 7 * * 4"
  workflow_dispatch:
    inputs:
      season:
        description: "Season year override (default: current year)"
        required: false
      round:
        description: "Round number override (default: next unplayed round)"
        required: false
      competition:
        description: "Competition(s) to publish"
        type: choice
        options:
          - both
          - AFLM
          - AFLW
        default: both

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # On schedule runs `inputs` is empty, so both competitions publish.
        competition: ${{ fromJSON(inputs.competition == 'AFLM' && '["AFLM"]' || inputs.competition == 'AFLW' && '["AFLW"]' || '["AFLM","AFLW"]') }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Publish ${{ matrix.competition }} predictions
        env:
          # API token with D1 write access to the afl-stats database.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SEASON: ${{ inputs.season }}
          ROUND: ${{ inputs.round }}
        run: |
          args=(--comp "${{ matrix.competition }}")
          if [ -n "$SEASON" ]; then args+=(--season "$SEASON"); fi
          if [ -n "$ROUND" ]; then args+=(--round "$ROUND"); fi
          node dist/cli/index.js publish "${args[@]}"
